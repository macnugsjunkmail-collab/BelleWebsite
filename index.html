<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chasing at the Belle</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Home / Choose Character Showcase -->
  <div id="homeShowcase">
    <div class="scroll-content">
      <div class="title-logo">
        <img src="Chasing's.png" alt="Chasing's" class="title-chasing">
        <img src="Shelf.png" alt="Shelf" class="title-shelf">
      </div>
      <h2>Whose mind would you like to explore today?</h2>

      <div class="book-grid">
        <div class="book-item">
          <img src="image1.png" alt="Ned at the Belle">
        </div>
        <div class="book-item">
          <img src="image2.png" alt="Kym at the Belle">
        </div>
        <div class="book-item">
          <img src="image3.png" alt="Neville at the Belle">
        </div>
        <div class="book-item">
          <img src="image4.png" alt="Anna at the Belle">
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
